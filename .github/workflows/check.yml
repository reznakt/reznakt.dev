name: check

on:
  - push
  - pull_request

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Set up Nix
        uses: cachix/install-nix-action@v31

      - name: Install dependencies
        run: nix develop -c bun install

      - name: Run linter
        run: nix develop -c bun run lint

      - name: Run formatter
        run: nix develop -c bun run format
